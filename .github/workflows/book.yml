name: Check docs up-to-date
on:
  push:
    branches: ["main"]
    paths:
      - 'book/**'
      - 'docs/**'
      - '.gitignore'
      - 'Makefile'
      - '.github/workflows/book.yml'
  pull_request:
    branches: ["main"]
    types: [opened, synchronize]
    paths:
      - 'book/**'
      - 'docs/**'
      - '.gitignore'
      - 'Makefile'
      - '.github/workflows/book.yml'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install and test the mdBook
        run: make test-book

      - name: Verify coverage chapter is in default state
        # Absence of the awk-generated stamp marker. Decouples CI from the
        # exact default-block wording so the latter can be reworded freely.
        run: |
          if grep -q "^\*\*Last collected:\*\*" \
            book/src/developer_guide/coverage.md; then
            echo "::error::book/src/developer_guide/coverage.md is stamped with local coverage; revert it before committing."
            exit 1
          fi

      - name: Build book
        run: mdbook build book

      - name: Build book to tmp
        run: mdbook build book -d docs-tmp

      - name: Compare with committed docs
        run: |
          if ! diff -r docs-tmp docs 2>/dev/null; then
            echo "docs/ is not up-to-date. Run \`make book\` and commit the docs/ directory"
            exit 1
          fi
