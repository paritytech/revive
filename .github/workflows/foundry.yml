name: Foundry Integration

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize]
    paths-ignore:
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Workflow-internal foundry envs are prefixed with `CI_` to not conflict with the
  # `FOUNDRY_*` namespace, which foundry itself will interpret for its configuration.
  CI_FOUNDRY_PROJECT_ROOT: tooling-projects/foundry/counter
  # This is currently the commit that adds support for resolc ">=0.6.0, <2.0.0".
  # The latest release as of Apr. 28, 2026 supports ">=0.6.0, <0.7.0".
  # Once a release includes the updated supported versions, this can be changed to a
  # tag in order to download the prebuilt binary.
  CI_FOUNDRY_POLKADOT_COMMIT: b3173d0584382687cc96b2af072d8cb2addf23d3

jobs:
  use-foundry:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout revive
        uses: actions/checkout@v4

      - name: Set Up Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # without this it will override our rust flags
          rustflags: ""

      - name: Download LLVM
        uses: ./.github/actions/get-llvm
        with:
          target: x86_64-unknown-linux-gnu

      - name: Set LLVM Environment Variables
        run: echo "LLVM_SYS_221_PREFIX=$(pwd)/llvm-x86_64-unknown-linux-gnu" >> $GITHUB_ENV

      - name: Build resolc
        run: |
          make install-bin
          echo "RESOLC_BIN=$GITHUB_WORKSPACE/target/release/resolc" >> "$GITHUB_ENV"

      # TODO: Remove once the next step replaces `--commit` with `--install`.
      - name: Cache foundryup-polkadot
        uses: actions/cache@v5
        with:
          path: ~/.foundry
          key: foundryup-polkadot-${{ env.CI_FOUNDRY_POLKADOT_COMMIT }}

      - name: Install foundryup-polkadot and forge
        run: |
          # TODO: Replace "--commit" with "--install" once a release with this commit exists: https://github.com/paritytech/foundry-polkadot/commit/b3173d0584382687cc96b2af072d8cb2addf23d3

          curl -fsSL https://raw.githubusercontent.com/paritytech/foundry-polkadot/refs/heads/master/foundryup/install | bash
          "$HOME/.foundry/bin/foundryup-polkadot" --commit "$CI_FOUNDRY_POLKADOT_COMMIT"
          echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"

      - name: Check Tool Versions
        run: |
          foundryup-polkadot --version
          forge --version

      - name: Fetch Project Dependencies
        run: |
          mkdir -p "$CI_FOUNDRY_PROJECT_ROOT/lib"
          git clone --depth 1 --branch v1.15.0 \
            https://github.com/foundry-rs/forge-std.git "$CI_FOUNDRY_PROJECT_ROOT/lib/forge-std"

      - name: Build Project
        run: forge build --root "$CI_FOUNDRY_PROJECT_ROOT" --use-resolc "$RESOLC_BIN"

      - name: Verify Output
        run: |
          cd "$CI_FOUNDRY_PROJECT_ROOT"
          forge inspect Counter bytecode          | grep -q '^0x50564d'
          forge inspect Counter deployedBytecode  | grep -q '^0x50564d'
          forge inspect Counter irOptimized       | grep -q .
          forge inspect Counter ir                | grep -q .
          forge inspect Counter assembly          | grep -q .
          forge inspect Counter abi               --json | jq -e 'length > 0'             > /dev/null
          forge inspect Counter methodIdentifiers --json | jq -e 'length > 0'             > /dev/null
          forge inspect Counter storageLayout     --json | jq -e '.storage | length > 0'  > /dev/null
          forge inspect Counter metadata          --json | jq -e 'length > 0'             > /dev/null
          forge inspect Counter devdoc            --json | jq -e 'length > 0'             > /dev/null
          forge inspect Counter userdoc           --json | jq -e 'length > 0'             > /dev/null

      - name: Test project
        run: forge test --root "$CI_FOUNDRY_PROJECT_ROOT" --polkadot=pvm --use-resolc "$RESOLC_BIN" -vvvv
