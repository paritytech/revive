name: Reusable Build — Windows

on:
  workflow_call:
    inputs:
      retention_days:
        description: "Artifact retention days"
        required: false
        type: number
        default: 1
    outputs:
      url:
        value: ${{ jobs.build.outputs.url }}
      sha:
        value: ${{ jobs.build.outputs.sha }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows
    runs-on: windows-2022
    outputs:
      url: ${{ steps.build.outputs.url }}
      sha: ${{ steps.build.outputs.sha }}
    concurrency:
      # Use `reusable-build` and not `${{ github.workflow }}` here so that callers share the same concurrency group.
      group: reusable-build-x86_64-pc-windows-msvc-${{ github.sha }}
      cancel-in-progress: false
    steps:
      - name: Enable Long Paths
        run: git config --system core.longpaths true

      - name: Checkout revive
        uses: actions/checkout@v6

      - name: Build resolc
        id: build
        uses: ./.github/actions/build-resolc
        with:
          target: x86_64-pc-windows-msvc
          build-type: native
          retention-days: ${{ inputs.retention_days }}
